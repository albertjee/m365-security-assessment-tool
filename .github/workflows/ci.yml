name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test (PowerShell ${{ matrix.ps-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ps-version: ['7.2', '7.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PowerShell
        uses: bjompen/UpdatePWSHAction@v1.0.0
        with:
          ReleaseVersion: ${{ matrix.ps-version }}

      - name: Install Pester and PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester           -RequiredVersion 5.5.0 -Force -SkipPublisherCheck
          Install-Module -Name PSScriptAnalyzer -MinimumVersion 1.21.0 -Force -SkipPublisherCheck

      - name: Validate module manifest
        shell: pwsh
        run: |
          $result = Test-ModuleManifest -Path './m365-security-assessment-tool.psd1'
          if (-not $result) { exit 1 }
          Write-Host "Module manifest valid: $($result.Name) v$($result.Version)"

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 `
                       -Severity Error,Warning -ExcludeRule PSAvoidUsingWriteHost
          if ($results.Count -gt 0) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no issues found"

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path           = './tests'
          $config.Output.Verbosity   = 'Minimal'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = './TestResults.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'

          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester: $($result.FailedCount) test(s) failed"
            exit 1
          }
          Write-Host "Pester: $($result.PassedCount) tests passed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ps${{ matrix.ps-version }}
          path: TestResults.xml
